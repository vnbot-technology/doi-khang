name: Export Game

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    name: Export Windows & Mac
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          mv /root/.local/share/godot/export_templates/4.3.stable/* \
             ~/.local/share/godot/export_templates/4.3.stable/ 2>/dev/null || true

      - name: Create export directories
        run: |
          mkdir -p build/windows
          mkdir -p build/mac

      - name: Export Windows
        run: |
          cd godot_project
          godot --headless --export-release "Windows Desktop" \
            ../build/windows/DoiKhangAnime.exe

      - name: Export Mac
        run: |
          cd godot_project
          godot --headless --export-release "macOS" \
            ../build/mac/DoiKhangAnime.zip

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: DoiKhangAnime-Windows
          path: build/windows/
          retention-days: 30

      - name: Upload Mac build
        uses: actions/upload-artifact@v4
        with:
          name: DoiKhangAnime-Mac
          path: build/mac/
          retention-days: 30
